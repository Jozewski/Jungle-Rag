<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Survival Guide 🌿</title>
  <style>
    /* ── Fonts ── */
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400;500;600&family=Fira+Mono:wght@400;500&display=swap');

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --jungle-dark:    #0d1a0f;
      --jungle-deep:    #112214;
      --jungle-mid:     #1a3320;
      --jungle-leaf:    #2d5a27;
      --jungle-bright:  #4a8c3f;
      --jungle-lime:    #7bc67a;
      --jungle-glow:    #a8e6a3;
      --desert-sand:    #c8a96e;
      --desert-amber:   #e8b85a;
      --ocean-blue:     #1a4a6e;
      --ocean-teal:     #2a7a8a;
      --arctic-ice:     #a8d4e8;
      --text-primary:   #e8f5e2;
      --text-secondary: #a0c8a0;
      --text-muted:     #5a8a5a;
      --card-bg:        rgba(26, 51, 32, 0.7);
      --border:         rgba(74, 140, 63, 0.3);
      --glow:           rgba(122, 198, 118, 0.15);
      --shadow:         0 8px 32px rgba(0, 0, 0, 0.6);
    }

    body {
      background: var(--jungle-dark);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Animated jungle background ── */
    .jungle-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(29, 66, 29, 0.4) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(20, 52, 20, 0.5) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(13, 26, 15, 0.8) 0%, transparent 70%),
        linear-gradient(180deg, #050d06 0%, #0d1a0f 40%, #091409 100%);
    }

    /* Leaf particles */
    .leaves {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .leaf {
      position: absolute;
      font-size: 1.2rem;
      opacity: 0;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.2; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }

    /* ── Layout ── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 80px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 50px 0 32px;
    }
    .logo {
      font-size: 3rem;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 20px rgba(122,198,118,0.5));
    }
    h1 {
      font-family: 'Cinzel', serif;
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--jungle-glow), var(--desert-amber), var(--jungle-lime));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.04em;
      text-shadow: none;
      margin-bottom: 8px;
    }
    .subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Topics bar ── */
    .topics-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .topic-chip {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.78rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
    }
    .topic-chip:hover {
      background: rgba(74, 140, 63, 0.25);
      border-color: var(--jungle-bright);
      color: var(--jungle-glow);
      transform: translateY(-1px);
    }

    /* ── Question suggestions ── */
    .suggestions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }
    .suggestion {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.83rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      backdrop-filter: blur(8px);
      line-height: 1.4;
    }
    .suggestion:hover {
      background: rgba(74, 140, 63, 0.2);
      border-color: var(--jungle-bright);
      color: var(--text-primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(74, 140, 63, 0.15);
    }
    .suggestion .icon { margin-right: 6px; }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 20px;
    }

    /* Message bubbles */
    .message {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .avatar.bot  { background: linear-gradient(135deg, #1a3320, #2d5a27); }
    .avatar.user { background: linear-gradient(135deg, #1a2a3a, #2a4a6a); }

    .bubble {
      max-width: 78%;
      padding: 14px 18px;
      border-radius: 16px;
      line-height: 1.65;
      font-size: 0.92rem;
      box-shadow: var(--shadow);
    }
    .message.bot .bubble {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      backdrop-filter: blur(12px);
    }
    .message.user .bubble {
      background: linear-gradient(135deg, rgba(26,74,110,0.6), rgba(42,74,100,0.6));
      border: 1px solid rgba(42,122,138,0.3);
      border-top-right-radius: 4px;
      color: #d0e8f5;
    }

    /* Markdown-like styling inside bubbles */
    .bubble strong { color: var(--jungle-lime); }
    .bubble ul, .bubble ol { padding-left: 18px; margin: 8px 0; }
    .bubble li { margin: 4px 0; }
    .bubble p { margin: 6px 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child { margin-bottom: 0; }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 14px 18px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--jungle-bright);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%            { transform: scale(1);   opacity: 1; }
    }

    /* ── Sources panel ── */
    .sources-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 10px;
      backdrop-filter: blur(8px);
    }
    .sources-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .source-item {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(74,140,63,0.2);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .source-item:last-child { margin-bottom: 0; }
    .source-item:hover {
      border-color: var(--jungle-bright);
      background: rgba(74, 140, 63, 0.1);
    }
    .source-item .source-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .source-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--jungle-lime);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .source-score {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-family: 'Fira Mono', monospace;
    }
    .source-excerpt {
      font-size: 0.78rem;
      color: var(--text-secondary);
      line-height: 1.5;
      display: none;
    }
    .source-item.expanded .source-excerpt { display: block; }
    .expand-btn {
      font-size: 0.7rem;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    /* Score bar */
    .score-bar {
      height: 3px;
      background: rgba(74,140,63,0.2);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--jungle-bright), var(--jungle-lime));
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* ── Input area ── */
    .input-wrapper {
      position: sticky;
      bottom: 0;
      background: linear-gradient(transparent, var(--jungle-dark) 30%);
      padding: 16px 0 24px;
      z-index: 10;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 14px;
      backdrop-filter: blur(16px);
      box-shadow: 0 4px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(74,140,63,0.1);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-row:focus-within {
      border-color: var(--jungle-bright);
      box-shadow: 0 4px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(74,140,63,0.3), 0 0 20px rgba(74,140,63,0.1);
    }
    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.93rem;
      resize: none;
      min-height: 24px;
      max-height: 120px;
      line-height: 1.5;
    }
    textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--jungle-leaf), var(--jungle-bright));
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      color: white;
      font-size: 1rem;
    }
    .send-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--jungle-bright), var(--jungle-lime));
      transform: scale(1.05);
    }
    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-text { font-size: 0.9rem; line-height: 1.6; }

    /* ── Env icon badge ── */
    .env-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 2px;
      border: 1px solid;
    }
    .env-jungle  { background: rgba(45,90,39,0.3);  border-color: rgba(74,140,63,0.5); color: var(--jungle-lime); }
    .env-desert  { background: rgba(200,169,110,0.2); border-color: rgba(232,184,90,0.5); color: var(--desert-amber); }
    .env-arctic  { background: rgba(26,74,110,0.3);  border-color: rgba(168,212,232,0.4); color: var(--arctic-ice); }
    .env-ocean   { background: rgba(26,74,110,0.3);  border-color: rgba(42,122,138,0.5); color: #5abcd8; }

    /* ── Error toast ── */
    .error-msg {
      background: rgba(139, 30, 30, 0.3);
      border: 1px solid rgba(220, 80, 80, 0.4);
      border-radius: 10px;
      padding: 12px 16px;
      color: #ffaaaa;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--jungle-mid); border-radius: 3px; }
  </style>
</head>
<body>

<!-- Animated background -->
<div class="jungle-bg"></div>
<div class="leaves" id="leaves"></div>

<div class="container">

  <!-- Header -->
  <header>
    <div class="logo">🌿</div>
    <h1>THE SURVIVAL GUIDE</h1>
    <p class="subtitle">RAG-Powered Wilderness Knowledge Base</p>
    <div style="margin-top: 14px; display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;">
      <span class="env-badge env-jungle">🌿 Jungle</span>
      <span class="env-badge env-desert">☀️ Desert</span>
      <span class="env-badge env-arctic">❄️ Arctic / Alaska</span>
      <span class="env-badge env-ocean">🌊 Ocean / Shipwreck</span>
    </div>
  </header>

  <!-- Topic chips (loaded dynamically) -->
  <div class="topics-bar" id="topicsBar"></div>

  <!-- Quick suggestion cards -->
  <div class="suggestions" id="suggestions">
    <button class="suggestion" onclick="askQuestion(this.dataset.q)" data-q="How do I build an emergency shelter in the jungle?">
      <span class="icon">🏕️</span> How do I build an emergency shelter in the jungle?
    </button>
    <button class="suggestion" onclick="askQuestion(this.dataset.q)" data-q="What can I eat if I'm lost in the desert?">
      <span class="icon">🌵</span> What can I eat if I'm lost in the desert?
    </button>
    <button class="suggestion" onclick="askQuestion(this.dataset.q)" data-q="How do I treat hypothermia in the wilderness?">
      <span class="icon">🥶</span> How do I treat hypothermia?
    </button>
    <button class="suggestion" onclick="askQuestion(this.dataset.q)" data-q="If I'm shipwrecked, how do I find fresh water at sea?">
      <span class="icon">🚢</span> How do I find fresh water after a shipwreck?
    </button>
    <button class="suggestion" onclick="askQuestion(this.dataset.q)" data-q="What are the most dangerous animals in the jungle and how do I avoid them?">
      <span class="icon">🐍</span> Most dangerous jungle animals?
    </button>
    <button class="suggestion" onclick="askQuestion(this.dataset.q)" data-q="How do I navigate without a compass in the jungle?">
      <span class="icon">🧭</span> Navigate without a compass in the jungle?
    </button>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🗺️</div>
      <div class="empty-text">
        Ask me anything about surviving in the wild.<br>
        <span style="color: var(--text-muted); font-size: 0.8rem;">All answers are grounded in the knowledge base — no hallucinations.</span>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-wrapper">
    <div class="input-row">
      <textarea
        id="questionInput"
        placeholder="Ask a survival question…"
        rows="1"
        onkeydown="handleKeydown(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendQuestion()" title="Send">
        ➤
      </button>
    </div>
  </div>

</div>

<script>
  const API_BASE = '';  // empty = same origin

  // ── Leaf animation ──
  const leafEmojis = ['🍃', '🌿', '🌱', '🍀', '🌾'];
  const leavesEl = document.getElementById('leaves');
  for (let i = 0; i < 18; i++) {
    const leaf = document.createElement('div');
    leaf.className = 'leaf';
    leaf.textContent = leafEmojis[Math.floor(Math.random() * leafEmojis.length)];
    leaf.style.left = Math.random() * 100 + 'vw';
    leaf.style.animationDuration = (8 + Math.random() * 12) + 's';
    leaf.style.animationDelay = (Math.random() * 15) + 's';
    leaf.style.fontSize = (0.8 + Math.random() * 0.8) + 'rem';
    leavesEl.appendChild(leaf);
  }

  // ── Load topics ──
  async function loadTopics() {
    try {
      const res = await fetch(`${API_BASE}/api/topics`);
      const data = await res.json();
      const bar = document.getElementById('topicsBar');
      bar.innerHTML = '';
      data.topics.forEach(t => {
        const chip = document.createElement('button');
        chip.className = 'topic-chip';
        chip.textContent = t.name;
        chip.onclick = () => askQuestion(`Tell me about ${t.name.toLowerCase()}`);
        bar.appendChild(chip);
      });
    } catch (e) {
      console.warn('Could not load topics', e);
    }
  }
  loadTopics();

  // ── Auto-resize textarea ──
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  }

  // ── Ask from suggestion ──
  function askQuestion(q) {
    document.getElementById('questionInput').value = q;
    sendQuestion();
    document.getElementById('suggestions').style.display = 'none';
  }

  // ── Send question ──
  async function sendQuestion() {
    const input = document.getElementById('questionInput');
    const question = input.value.trim();
    if (!question) return;

    // Hide suggestions and empty state
    document.getElementById('suggestions').style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';

    const chatArea = document.getElementById('chatArea');
    const sendBtn = document.getElementById('sendBtn');

    // User bubble
    appendMessage('user', question);
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    // Typing indicator
    const typingId = appendTyping();

    try {
      const res = await fetch(`${API_BASE}/api/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      });

      removeTyping(typingId);

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
        appendError(err.detail || 'Server error');
        return;
      }

      const data = await res.json();
      appendBotMessage(data.answer, data.sources);

    } catch (e) {
      removeTyping(typingId);
      appendError('Could not reach the server. Make sure the backend is running.');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }

    // Scroll to bottom
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  // ── Append user message ──
  function appendMessage(role, text) {
    const chatArea = document.getElementById('chatArea');
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    msg.innerHTML = `
      <div class="avatar ${role}">${role === 'user' ? '👤' : '🌿'}</div>
      <div class="bubble">${escapeHtml(text)}</div>
    `;
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  // ── Append bot message with sources ──
  function appendBotMessage(answer, sources) {
    const chatArea = document.getElementById('chatArea');
    const msg = document.createElement('div');
    msg.className = 'message bot';

    const formattedAnswer = formatMarkdown(answer);

    // Build sources HTML
    let sourcesHtml = '';
    if (sources && sources.length > 0) {
      const sourceItems = sources.map((s, i) => {
        const pct = Math.round(s.score * 100);
        const icon = getSourceIcon(s.source);
        return `
          <div class="source-item" onclick="toggleSource(this)">
            <div class="source-header">
              <span class="source-name">${icon} ${escapeHtml(s.source)}</span>
              <span class="source-score">${pct}% match</span>
            </div>
            <div class="score-bar"><div class="score-fill" style="width: ${pct}%"></div></div>
            <div class="source-excerpt">${escapeHtml(s.text)}</div>
          </div>
        `;
      }).join('');

      sourcesHtml = `
        <div class="sources-panel">
          <div class="sources-title">📚 Sources (${sources.length} chunks retrieved)</div>
          ${sourceItems}
        </div>
      `;
    }

    msg.innerHTML = `
      <div class="avatar bot">🌿</div>
      <div style="max-width: 78%; display: flex; flex-direction: column; gap: 10px;">
        <div class="bubble">${formattedAnswer}</div>
        ${sourcesHtml}
      </div>
    `;
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function toggleSource(el) {
    el.classList.toggle('expanded');
  }

  function getSourceIcon(source) {
    const s = source.toLowerCase();
    if (s.includes('jungle') || s.includes('shelter') || s.includes('wildlife') || s.includes('fire') || s.includes('food') || s.includes('navigation')) return '🌿';
    if (s.includes('desert')) return '☀️';
    if (s.includes('alaska') || s.includes('arctic') || s.includes('tundra')) return '❄️';
    if (s.includes('ocean') || s.includes('sea') || s.includes('ship')) return '🌊';
    if (s.includes('first') || s.includes('aid')) return '🩺';
    if (s.includes('signal')) return '🔥';
    return '📖';
  }

  // ── Typing indicator ──
  function appendTyping() {
    const chatArea = document.getElementById('chatArea');
    const id = 'typing-' + Date.now();
    const msg = document.createElement('div');
    msg.className = 'message bot';
    msg.id = id;
    msg.innerHTML = `
      <div class="avatar bot">🌿</div>
      <div class="bubble typing-indicator">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    `;
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  // ── Error message ──
  function appendError(msg) {
    const chatArea = document.getElementById('chatArea');
    const el = document.createElement('div');
    el.className = 'error-msg';
    el.innerHTML = `⚠️ ${escapeHtml(msg)}`;
    chatArea.appendChild(el);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  // ── Utilities ──
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatMarkdown(text) {
    // Simple markdown: bold, bullets, line breaks
    return escapeHtml(text)
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
      .replace(/\n\n+/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^/, '<p>')
      .replace(/$/, '</p>')
      .replace(/<p><\/p>/g, '');
  }
</script>
</body>
</html>
